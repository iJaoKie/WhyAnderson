<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#F8F7F4"/>
<title>TaskFlow</title>
<!-- Supabase JS SDK (ESM via CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#F8F7F4;--sf:#FFFFFF;--s2:#F0EEE9;--s3:#E7E5DF;
  --bd:#E2E0DA;--bd2:#C9C7BF;
  --tx:#1A1916;--t2:#64635D;--t3:#A5A49E;
  --gr:#1B6446;--gr-l:#E3F2EB;--gr-d:#0D3323;
  --rd:#B02424;--rd-l:#FBEAEA;--rd-d:#640E0E;
  --am:#8F5010;--am-l:#FDF0DC;--am-d:#4D2A00;
  --pu:#4530A0;--pu-l:#EDEAFC;--pu-d:#221760;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.09),0 2px 5px rgba(0,0,0,.05);
  --sh-lg:0 20px 60px rgba(0,0,0,.14),0 8px 20px rgba(0,0,0,.08);
  --r:8px;--rl:14px;--rxl:22px;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-appearance:none}
input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
.ts{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}

/* ── Shell ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:40;padding-top:env(safe-area-inset-top);height:calc(52px + env(safe-area-inset-top))}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;color:var(--tx);letter-spacing:-.4px;flex-shrink:0}
.logo-badge{width:28px;height:28px;background:var(--gr);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.desktop-nav{display:flex;gap:2px;margin-left:6px;overflow-x:auto;scrollbar-width:none}
.desktop-nav::-webkit-scrollbar{display:none}
.ntab{padding:6px 11px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);background:transparent;white-space:nowrap;transition:all .15s}
.ntab:hover{background:var(--s2);color:var(--tx)}
.ntab.active{background:var(--s2);color:var(--tx)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-icon{width:34px;height:34px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--t2);flex-shrink:0;transition:all .15s}
.btn-icon:hover{background:var(--s2)}
.av-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.av-btn:hover{border-color:var(--bd2)}
.btn-p{padding:8px 15px;background:var(--gr);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;white-space:nowrap;transition:background .15s}
.btn-p:hover,.btn-p:active{background:var(--gr-d)}
.btn-s{padding:7px 13px;border:1px solid var(--bd2);background:var(--sf);border-radius:var(--r);font-size:13px;color:var(--t2);font-weight:500;transition:all .15s}
.btn-s:hover{background:var(--s2)}
.btn-d{padding:7px 13px;border:1px solid #f0b8b8;background:var(--rd-l);border-radius:var(--r);font-size:13px;color:var(--rd);font-weight:500}
.btn-d:hover{background:#f0b8b8}
.btn-sm{padding:5px 10px;border:1px solid var(--bd);background:var(--sf);border-radius:6px;font-size:12px;color:var(--t2);font-weight:500;transition:all .15s}
.btn-sm:hover{background:var(--s2)}
.badge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;letter-spacing:.02em;display:inline-block;white-space:nowrap}
.av{border-radius:50%;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;line-height:1}
.av-xs{width:20px;height:20px;font-size:8px}
.av-sm{width:24px;height:24px;font-size:9px}
.av-md{width:32px;height:32px;font-size:11px}
.av-lg{width:40px;height:40px;font-size:14px}
.av-tip{position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;border-radius:6px;padding:4px 9px;white-space:nowrap;font-size:11px;z-index:60;pointer-events:none;opacity:0;transition:opacity .15s;font-weight:500}
.av:hover .av-tip{opacity:1}
.spill{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}

/* ── Content / tabs ── */
.content-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.tab-pane{flex:1;overflow:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.tab-pane.active{display:flex}

/* ── Bottom nav ── */
.bottom-nav{display:none;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bnav-inner{display:flex;height:56px}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--t3);transition:color .15s;padding:4px}
.bnav-btn.active{color:var(--gr)}
.bnav-icon{font-size:20px;line-height:1}
.bnav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

/* ── Board ── */
.board-layout{display:flex;flex:1;overflow:hidden}
.board-scroll{flex:1;overflow:auto;padding:14px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.board{display:flex;gap:12px;align-items:flex-start;padding-bottom:28px;min-width:max-content}
.col{width:220px;flex-shrink:0}
.col-hdr{display:flex;align-items:center;gap:6px;margin-bottom:9px;padding:0 3px}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-name{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;flex:1}
.col-cnt{background:var(--s2);border-radius:20px;padding:1px 7px;font-size:11px;color:var(--t3)}
.col-body{min-height:80px;display:flex;flex-direction:column;gap:8px;border-radius:var(--r);padding:3px;transition:background .15s}
.col-body.drag-over{background:var(--gr-l);outline:2px dashed var(--gr);outline-offset:-3px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s;box-shadow:var(--sh);touch-action:none}
.card:hover{border-color:var(--bd2);box-shadow:var(--sh-md);transform:translateY(-1px)}
.card.dragging{opacity:.3;cursor:grabbing}
.card.selected{border-color:var(--gr);box-shadow:0 0 0 2px var(--gr-l),var(--sh)}
.card-title{font-size:13px;color:var(--tx);margin-bottom:8px;line-height:1.45;font-weight:500}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card-due{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:3px}
.due-ok{background:var(--gr-l);color:var(--gr-d)}
.due-soon{background:var(--am-l);color:var(--am-d)}
.due-late{background:var(--rd-l);color:var(--rd-d)}
.cmmt-cnt{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:3px;margin-left:auto}
.add-btn{width:100%;padding:7px;border:1px dashed var(--bd);background:transparent;border-radius:var(--r);font-size:12px;color:var(--t3);margin-top:4px;transition:all .15s;font-weight:500}
.add-btn:hover,.add-btn:active{background:var(--s2);color:var(--t2);border-color:var(--bd2)}

/* ── Detail panel ── */
.detail-panel{width:360px;flex-shrink:0;border-left:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.detail-panel.closed{width:0;border:none}
.dp-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain}
.dp-head{padding:14px 16px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--sf);z-index:5}
.dp-title{font-size:15px;font-weight:600;color:var(--tx);flex:1;line-height:1.4}
.dp-close{font-size:20px;color:var(--t3);padding:2px;line-height:1;flex-shrink:0}
.dp-close:hover{color:var(--t2)}
.dp-section{padding:12px 16px;border-bottom:1px solid var(--bd)}
.dp-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}
.dp-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.dp-key{color:var(--t3);width:76px;flex-shrink:0;font-size:12px;font-weight:500}
.dp-val{color:var(--tx);font-size:13px}
textarea.desc-edit{width:100%;min-height:76px;padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--tx);background:var(--bg);resize:vertical;line-height:1.55;outline:none}
textarea.desc-edit:focus{border-color:var(--gr);box-shadow:0 0 0 2.5px var(--gr-l)}
.desc-text{font-size:13px;color:var(--tx);line-height:1.65;white-space:pre-wrap;word-break:break-word}
.desc-empty{font-size:13px;color:var(--t3);font-style:italic;cursor:pointer}
.desc-empty:hover{color:var(--t2)}
.edit-row{display:flex;gap:6px;margin-top:7px}
.comments-wrap{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.comment{display:flex;gap:8px}
.cmmt-body{flex:1;min-width:0}
.cmmt-hdr{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.cmmt-name{font-size:12px;font-weight:600;color:var(--tx)}
.cmmt-time{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.cmmt-bubble{font-size:13px;color:var(--tx);line-height:1.55;background:var(--s2);border-radius:3px 12px 12px 12px;padding:8px 11px;word-break:break-word}
.cmmt-system{display:flex;align-items:center;gap:8px;padding:2px 0}
.csys-line{height:1px;flex:1;background:var(--bd)}
.csys-text{font-size:11px;color:var(--t3);white-space:nowrap}
.cmmt-file{display:inline-flex;align-items:center;gap:5px;margin-top:5px;padding:5px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);font-size:11px;color:var(--t2)}
.cmmt-acts{display:flex;gap:8px;margin-top:4px}
.cmmt-act{font-size:11px;color:var(--t3);font-weight:500}
.cmmt-act:hover{color:var(--t2)}
.replies{margin-top:8px;padding-left:7px;border-left:2px solid var(--bd);display:flex;flex-direction:column;gap:8px}
.reply-box{display:flex;gap:6px;align-items:flex-end;margin-top:6px}
.reply-input{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;resize:none;background:var(--bg);color:var(--tx);outline:none;line-height:1.4}
.reply-input:focus{border-color:var(--gr);box-shadow:0 0 0 2px var(--gr-l)}
.reply-send{padding:7px 11px;background:var(--gr);color:#fff;border-radius:var(--r);font-size:12px;font-weight:600}
.nc-area{padding:12px 16px;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.nc-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:7px}
.nc-input{flex:1;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;resize:none;background:var(--bg);color:var(--tx);min-height:42px;outline:none;line-height:1.5}
.nc-input:focus{border-color:var(--gr);box-shadow:0 0 0 2.5px var(--gr-l)}
.nc-footer{display:flex;align-items:center;gap:8px}
.nc-attach{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3);cursor:pointer;padding:5px 9px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);font-weight:500}
.nc-attach:hover{background:var(--s2);color:var(--t2)}

/* ── Filters ── */
.filter-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fpw{position:relative;flex-shrink:0}
.fp{padding:7px 12px;border:1px solid var(--bd);border-radius:20px;font-size:12px;color:var(--t2);background:var(--sf);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;font-weight:500;user-select:none;transition:all .15s}
.fp:hover{border-color:var(--bd2);background:var(--s2)}
.fp.active{border-color:var(--gr);background:var(--gr-l);color:var(--gr-d);font-weight:600}
.fp-cnt{background:var(--gr);color:#fff;border-radius:10px;padding:0 6px;font-size:10px;font-weight:700;line-height:18px;min-width:18px;text-align:center}
.fdrop{position:absolute;top:calc(100%+6px);left:0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);min-width:200px;max-width:260px;box-shadow:var(--sh-lg);z-index:100;overflow:hidden;display:flex;flex-direction:column;max-height:300px}
.fdrop-search-wrap{padding:8px 9px 6px;border-bottom:1px solid var(--bd);flex-shrink:0}
.fdrop-search{padding:6px 10px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--tx);outline:none;width:100%;display:block}
.fdrop-search:focus{border-color:var(--gr)}
.fdrop-opts{overflow-y:auto;flex:1}
.fdrop-item{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;font-size:13px;color:var(--tx);transition:background .1s;user-select:none}
.fdrop-item:hover{background:var(--s2)}
.fdrop-item.on{background:var(--gr-l)}
.fchk{width:17px;height:17px;border:1.5px solid var(--bd2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.fchk.on{background:var(--gr);border-color:var(--gr);color:#fff}
.fchk.on::after{content:'✓';font-size:10px;font-weight:700;line-height:1}
.fdrop-footer{padding:7px 12px;border-top:1px solid var(--bd);display:flex;gap:7px;align-items:center;flex-shrink:0}
.f-count{font-size:11px;color:var(--t3);flex:1}
.srch-input{padding:7px 12px;border:1px solid var(--bd);border-radius:20px;font-size:12px;background:var(--sf);color:var(--tx);outline:none;min-width:140px;flex-shrink:0;font-weight:500}
.srch-input:focus{border-color:var(--gr)}

/* ── List ── */
.list-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);margin:14px}
.lrow{display:grid;grid-template-columns:1fr 76px 72px 108px 84px 44px;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--bd);font-size:13px;cursor:pointer;transition:background .12s;min-width:580px}
.lrow:last-child{border-bottom:none}
.lrow:not(.lhdr):hover{background:var(--s2)}
.lhdr{background:var(--s2);cursor:default;position:sticky;top:0;z-index:2}
.lhdr-cell{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none}
.lhdr-cell:hover{color:var(--t2)}

/* ── Dashboard ── */
.dash-wrap{padding:14px}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:600px){.dash-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:15px 16px;box-shadow:var(--sh)}
.stat-lbl{font-size:10px;color:var(--t3);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.stat-val{font-size:28px;font-weight:700;color:var(--tx);line-height:1}
.stat-sub{font-size:11px;color:var(--t3);margin-top:4px}
.prog-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;box-shadow:var(--sh)}

/* ── My Work ── */
.mywork-wrap{padding:14px;max-width:700px;margin:0 auto}
.mywork-hero{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px;box-shadow:var(--sh);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mywork-name{font-size:20px;font-weight:700;color:var(--tx)}
.mywork-sub{font-size:13px;color:var(--t2);margin-top:3px}
.mywork-stats{display:flex;gap:10px;flex-wrap:wrap}
.mstat{text-align:center;padding:10px 14px;background:var(--s2);border-radius:var(--r)}
.mstat-val{font-size:22px;font-weight:700;color:var(--tx);line-height:1}
.mstat-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.section-title{font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-badge{font-size:10px;background:var(--s2);color:var(--t3);border-radius:10px;padding:1px 7px;font-weight:600}
.task-row{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.task-row:hover{border-color:var(--bd2);box-shadow:var(--sh-md)}
.task-row.urgent{border-left:3px solid var(--rd)}
.task-row.due-warn{border-left:3px solid var(--am)}
.task-row-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px}
.task-row-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.empty-state{text-align:center;padding:32px 20px;color:var(--t3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-msg{font-size:14px;font-weight:500;color:var(--t2)}
.empty-sub{font-size:12px;margin-top:4px}

/* ── Owner / Users / Archive / Settings ── */
.owner-wrap{padding:14px}
.owner-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:600px){.owner-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.owner-grid{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}}
.owner-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;box-shadow:var(--sh)}
.owner-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.owner-task{padding:9px 11px;border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:all .12s}
.owner-task:hover{border-color:var(--bd2);background:var(--s2)}
.archive-wrap{padding:14px}
.archive-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.archive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.archive-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:13px 14px;box-shadow:var(--sh);opacity:.85}
.archive-card:hover{opacity:1}
.archive-card-title{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:7px;line-height:1.4}
.users-wrap{padding:14px;max-width:640px}
.user-card{display:grid;grid-template-columns:40px 1fr auto auto;align-items:center;gap:12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:13px 16px;box-shadow:var(--sh);margin-bottom:9px}
.user-card:hover{border-color:var(--bd2)}
.user-name{font-size:14px;font-weight:600;color:var(--tx)}
.user-email{font-size:11px;color:var(--t3);margin-top:2px}
.role-badge{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.role-admin{background:var(--am-l);color:var(--am-d)}
.role-member{background:var(--gr-l);color:var(--gr-d)}
.role-viewer{background:var(--s2);color:var(--t2)}
.perm-denied{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;gap:12px}
.perm-denied .pd-icon{font-size:48px}
.perm-denied h3{font-size:16px;color:var(--t2);font-weight:600}
.perm-denied p{font-size:13px;max-width:250px;line-height:1.6;color:var(--t3)}
.settings-wrap{padding:14px;max-width:580px}
.settings-section{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);margin-bottom:16px}
.settings-hdr{padding:13px 16px;border-bottom:1px solid var(--bd);background:var(--s2)}
.settings-hdr-title{font-size:13px;font-weight:700;color:var(--tx)}
.settings-hdr-sub{font-size:11px;color:var(--t3);margin-top:2px}
.settings-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bd);cursor:grab}
.settings-row:last-child{border-bottom:none}
.settings-row.dragging{opacity:.4;cursor:grabbing}
.settings-row.drag-over{background:var(--gr-l);outline:2px dashed var(--gr);outline-offset:-2px}
.settings-row-info{flex:1}
.settings-row-name{font-size:13px;font-weight:500;color:var(--tx);display:flex;align-items:center;gap:7px}
.settings-row-sub{font-size:11px;color:var(--t3);margin-top:2px}
.sdot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.smgr-actions{display:flex;gap:6px}
.new-item-row{padding:12px 16px;background:var(--s2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.drag-handle{color:var(--t3);font-size:16px;cursor:grab;flex-shrink:0;user-select:none}
.drag-handle:active{cursor:grabbing}
/* status behavior chips */
.stchip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap}
.stchip-on{background:var(--gr-l);color:var(--gr-d);border-color:var(--gr-l)}
.stchip-off{background:var(--s2);color:var(--t3);border-color:var(--bd)}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:flex-start;justify-content:center;padding:50px 16px 16px;z-index:200;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
@media(max-width:600px){.overlay{padding:16px 10px;align-items:flex-end}}
.modal{background:var(--sf);border-radius:var(--rxl);border:1px solid var(--bd);padding:24px;width:100%;max-width:430px;box-shadow:var(--sh-lg);max-height:calc(100dvh - 80px);overflow-y:auto}
@media(max-width:600px){.modal{border-radius:var(--rxl) var(--rxl) 0 0;max-height:92dvh}}
.modal h3{font-size:18px;font-weight:700;margin-bottom:18px;color:var(--tx)}
.field{margin-bottom:12px}
.field label{font-size:12px;color:var(--t2);display:block;margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;font-size:14px;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gr);box-shadow:0 0 0 2.5px var(--gr-l)}
.field textarea{resize:vertical;min-height:70px;line-height:1.55}
.mactions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd)}

/* ── Mobile sheet ── */
.mob-overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.42);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.mob-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-radius:var(--rxl) var(--rxl) 0 0;max-height:94dvh;overflow:hidden;display:flex;flex-direction:column;z-index:91;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);padding-bottom:env(safe-area-inset-bottom)}
.mob-sheet.open{transform:translateY(0)}
.sheet-handle{width:44px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 6px;flex-shrink:0}
.sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── Login / Loading ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.login-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rxl);padding:32px 28px;width:100%;max-width:380px;box-shadow:var(--sh-lg)}

@keyframes spin{to{transform:rotate(360deg)}}
.db-status{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.db-ok{background:var(--gr-l);color:var(--gr-d)}
.db-err{background:var(--rd-l);color:var(--rd-d)}

/* ── Notif ── */
.notif-panel{position:fixed;top:58px;right:14px;width:290px;z-index:500;display:flex;flex-direction:column;gap:7px;pointer-events:none}
@media(max-width:600px){.notif-panel{top:auto;bottom:80px;left:14px;right:14px;width:auto}}
.notif{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:11px 14px;box-shadow:var(--sh-md);pointer-events:all;animation:sIn .25s ease;display:flex;gap:9px;align-items:flex-start}
@keyframes sIn{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-icon{font-size:17px;flex-shrink:0}
.notif-text{font-size:12px;color:var(--tx);line-height:1.45;flex:1;font-weight:500}
.notif-x{font-size:14px;color:var(--t3);flex-shrink:0;cursor:pointer}
.arch-btn{font-size:11px;color:var(--t3);padding:3px 7px;border-radius:5px;border:1px solid var(--bd);background:transparent;margin-top:6px;font-weight:500}
.arch-btn:hover{background:var(--am-l);color:var(--am-d);border-color:var(--am-l)}
.realtime-dot{width:7px;height:7px;border-radius:50%;background:var(--gr);display:inline-block;margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Responsive ── */
@media(max-width:768px){
  .desktop-nav{display:none}
  .bottom-nav{display:block}
  .topbar{padding:0 12px;padding-top:env(safe-area-inset-top)}

}
@media(min-width:769px){.mob-overlay,.mob-sheet{display:none!important}}

<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo"><div class="login-badge">T</div>TaskFlow</div>

<!-- App -->
<div class="app hidden" id="app">
  <div class="topbar">

    <nav class="desktop-nav" id="desktop-nav"></nav>
    <div class="topbar-right">
      <div id="realtime-indicator" class="hidden" title="Realtime connected" style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t3)">Live<span class="realtime-dot"></span></div>

        <div class="detail-panel closed" id="detail-panel">
          <div class="dp-scroll">
            <div class="dp-head"><div class="dp-title" id="dp-title"></div><button class="dp-close" onclick="closeDetail()">✕</button></div>
            <div class="dp-section" id="dp-meta-sec"></div>

        <div class="fpw"><button class="fp" id="fp-priority-btn" onclick="toggleDrop('priority')">Priority <span id="fp-priority-cnt" class="hidden fp-cnt"></span> ▾</button><div class="fdrop hidden" id="fd-priority"></div></div>
        <div class="fpw"><button class="fp" id="fp-assignee-btn" onclick="toggleDrop('assignee')">Assignee <span id="fp-assignee-cnt" class="hidden fp-cnt"></span> ▾</button><div class="fdrop hidden" id="fd-assignee"></div></div>

      <div style="flex:1;overflow:auto"><div class="list-wrap"><div id="list-body"></div></div></div>
    </div>
    <div class="tab-pane" id="pane-dash"><div style="flex:1;overflow:auto"><div class="dash-wrap"><div class="dash-grid" id="dash-stats"></div><div class="prog-card"><div class="dp-label" style="margin-bottom:12px">Progress by status</div><div id="prog-bars"></div></div></div></div></div>

    <div class="tab-pane" id="pane-users"><div style="flex:1;overflow:auto"><div class="users-wrap" id="users-wrap"></div></div></div>

</div>

<!-- Mobile sheet -->

<div class="mob-sheet" id="mob-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-scroll">

<!-- Modals -->
<div class="overlay hidden" id="task-modal">

<script>
// ══════════════════════════════════════════════
// ▶ CONFIGURATION — replace these two values!
// ══════════════════════════════════════════════
const SUPABASE_URL     = 'https://wikimjgijgxzkbtpbtno.supabase.co';      // e.g. https://xxxx.supabase.co
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpa2ltamdpamd4emtidHBidG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NzExNzcsImV4cCI6MjA5MzQ0NzE3N30.Gk05Yqdy6SMfCMv7P7MY9OmFVfpB1p1HRdhkBkVoY4Y';        // long JWT from Project Settings → API

// ══════════════════════════════════════════════
// SUPABASE CLIENT
// ══════════════════════════════════════════════
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let users=[], statuses=[], taskTypes=[], tasks=[], comments=[];
let currentUser=null, selectedTaskId=null, editingTaskId=null, editingUserId=null;
let currentTab='board', listSort={col:'created_at',dir:-1};
let attachStore={};
let filters={status:new Set(),type:new Set(),priority:new Set(),assignee:new Set()};
let openDrop=null;
let dragTaskId=null, dragStatusIdx=null, dragStatusEl=null;
let realtimeChannel=null;

// ══════════════════════════════════════════════
// PERMISSIONS
// ══════════════════════════════════════════════
const PERMS={
  admin:{createTask:1,editTask:1,manageStatuses:1,manageUsers:1,manageTypes:1,comment:1,archive:1},
  member:{createTask:1,editTask:1,comment:1},
  viewer:{}
};
const can=p=>!!(currentUser&&PERMS[currentUser.role]?.[p]);

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
const getUser=id=>users.find(u=>u.id===id);
const getStatus=id=>statuses.find(s=>s.id===id)||statuses[0];
const getTask=id=>tasks.find(t=>t.id===id);
const getType=id=>taskTypes.find(t=>t.id===id);
const isMob=()=>window.innerWidth<=768;
const mkTs=()=>new Date().toISOString();
function esc(s){const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML;}
function fmtBytes(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function fmtTime(iso){if(!iso)return'';const d=new Date(iso),n=new Date(),diff=n-d;if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';if(diff<604800000)return Math.floor(diff/86400000)+'d ago';return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});}
function fmtFull(iso){if(!iso)return'';return new Date(iso).toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function tcol(hex){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)>140?'#1A1916':'#fff';}catch{return'#fff';}}
function avHtml(uid,sz='sm'){const u=getUser(uid)||{initials:(uid||'?').slice(0,2),color:'#aaa',text_color:'#fff',name:uid||'?'};return`<div class="av av-${sz}" style="background:${u.color};color:${u.text_color||tcol(u.color)}">${esc(u.initials)}<div class="av-tip">${esc(u.name)}</div></div>`;}
function typeBadge(typeId){const t=getType(typeId);if(!t)return`<span class="badge" style="background:var(--s2);color:var(--t2)">${esc(typeId||'—')}</span>`;return`<span class="badge" style="background:${t.bg};color:${t.color}">${esc(t.icon)} ${esc(t.name)}</span>`;}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dueBadge(d, st){
  if(!d)return'';
  // If status has hide_due=true, suppress badge
  if(st&&st.hide_due)return'';
  const t=today0();const du=new Date(d);du.setHours(0,0,0,0);const df=(du-t)/864e5;
  if(df<0)return'<div class="card-due due-late">⚠ Overdue</div>';
  if(df<=3)return`<div class="card-due due-soon">⏰ Due ${df===0?'today':'in '+Math.round(df)+'d'}</div>`;
  return`<div class="card-due due-ok">📅 ${fmtDate(d)}</div>`;
}
function taskComments(taskId){return comments.filter(c=>c.task_id===taskId);}
function ccCount(taskId){return comments.filter(c=>c.task_id===taskId&&!c.is_system).length;}

// ══════════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════════
function showNotif(icon,text,dur=4500){
  const p=document.getElementById('notif-panel');
  const el=document.createElement('div');el.className='notif';
  el.innerHTML=`<div class="notif-icon">${icon}</div><div class="notif-text">${text}</div><button class="notif-x" onclick="this.parentElement.remove()">✕</button>`;
  p.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(14px)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300);},dur);
}
function checkDue(){
  const td=today0();
  tasks.filter(t=>t.due_date&&!t.archived).forEach(t=>{
    const st=getStatus(t.status);
    if(st&&st.hide_due)return; // done-like status — skip
    const due=new Date(t.due_date);due.setHours(0,0,0,0);
    const df=(due-td)/864e5;const u=getUser(t.assignee);
    if(df<0)showNotif('⚠️',`<b>${esc(u?.name||t.assignee)}</b>: "${esc(t.title)}" is overdue!`);
    else if(df<=1)showNotif('⏰',`<b>${esc(u?.name||t.assignee)}</b>: "${esc(t.title)}" due today!`);
  });
}

// DB — LOAD ALL DATA
// ══════════════════════════════════════════════
async function loadAll(){
  try{
    const [uRes,sRes,tyRes,tRes,cRes]=await Promise.all([
      sb.from('users').select('*').order('name'),
      sb.from('statuses').select('*').order('sort_order'),
      sb.from('task_types').select('*').order('sort_order'),
      sb.from('tasks').select('*').order('created_at',{ascending:false}),
      sb.from('comments').select('*,comment_files(*),comment_replies(*,reply_files(*))').order('created_at'),
    ]);
    if(uRes.error)throw uRes.error;
    users=uRes.data||[];statuses=sRes.data||[];taskTypes=tyRes.data||[];
    tasks=tRes.data||[];comments=cRes.data||[];
    return true;
  }catch(e){console.error('Load error:',e);return false;}
}

// ══════════════════════════════════════════════
// DB — REALTIME
// ══════════════════════════════════════════════
function subscribeRealtime(){
  realtimeChannel=sb.channel('taskflow-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>reloadAndRefresh())
    .on('postgres_changes',{event:'*',schema:'public',table:'comments'},()=>reloadAndRefresh())
    .on('postgres_changes',{event:'*',schema:'public',table:'statuses'},()=>reloadAndRefresh())
    .on('postgres_changes',{event:'*',schema:'public',table:'users'},()=>reloadAndRefresh())
    .on('postgres_changes',{event:'*',schema:'public',table:'task_types'},()=>reloadAndRefresh())
    .subscribe(status=>{
      const el=document.getElementById('realtime-indicator');
      if(el)el.classList.toggle('hidden',status!=='SUBSCRIBED');
    });
}
async function reloadAndRefresh(){await loadAll();renderAll();}

// ══════════════════════════════════════════════
// AUTO-ARCHIVE (7 days after completion)
// ══════════════════════════════════════════════
async function runAutoArchive(){
  const doneStatus=statuses.find(s=>s.is_done);if(!doneStatus)return;
  const cutoff=new Date(Date.now()-7*864e5).toISOString();
  const toArchive=tasks.filter(t=>!t.archived&&t.status===doneStatus.id&&t.completed_at&&t.completed_at<cutoff);
  for(const t of toArchive){
    await sb.from('tasks').update({archived:true,archived_at:mkTs()}).eq('id',t.id);
  }
  if(toArchive.length){await loadAll();renderAll();showNotif('📦',`${toArchive.length} task${toArchive.length>1?'s':''} auto-archived`);}
}

      e.preventDefault();body.classList.remove('drag-over');

async function moveTaskStatus(taskId,newStatusId){
  const t=getTask(taskId);if(!t||t.status===newStatusId)return;
  const oldSt=getStatus(t.status);const newSt=getStatus(newStatusId);
  const updates={status:newStatusId,updated_at:mkTs()};
  if(newSt.is_done&&!t.completed_at)updates.completed_at=mkTs();
  await sb.from('tasks').update(updates).eq('id',taskId);
  // system comment
  await sb.from('comments').insert({task_id:taskId,author:currentUser.id,text:`Status: <b>${oldSt.name}</b> → <b>${newSt.name}</b>`,is_system:true});
  showNotif('🔄',`"${esc(t.title)}" → ${esc(newSt.name)}`);
  await reloadAndRefresh();
  if(selectedTaskId===taskId)isMob()?openMobile(taskId):openDetail(taskId);
}
async function archiveTask(id){
  await sb.from('tasks').update({archived:true,archived_at:mkTs()}).eq('id',id);
  if(selectedTaskId===id){closeDetail();closeMobileDetail();}
  showNotif('📦','Task archived');await reloadAndRefresh();
}
async function unarchiveTask(id){
  await sb.from('tasks').update({archived:false,archived_at:null}).eq('id',id);
  showNotif('↩','Task restored');await reloadAndRefresh();
}
async function purgeArchive(){
  const ids=tasks.filter(t=>t.archived).map(t=>t.id);
  if(ids.length)await sb.from('tasks').delete().in('id',ids);
  showNotif('🗑','Archive cleared');await reloadAndRefresh();
}

async function postReply(wid,tid,cid){
  const inp=document.getElementById(`ri-${wid}-${cid}`);const text=inp?.value.trim();
  if(!text||!currentUser)return;

function onAttach(e,pfx){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{attachStore[pfx]={name:f.name,size:f.size,data_url:ev.target.result};};r.readAsDataURL(f);const prev=document.getElementById(pfx+'-preview');if(prev){prev.textContent='📎 '+f.name;prev.classList.remove('hidden');}e.target.value='';}
async function postComment(pfx,wrapId){
  if(!currentUser||!selectedTaskId)return;
  const inp=document.getElementById(pfx+'-input');const text=inp?.value.trim();
  if(!text&&!attachStore[pfx])return;
  const{data:cmmt}=await sb.from('comments').insert({task_id:selectedTaskId,author:currentUser.id,text:text||'',is_system:false}).select().single();
  if(cmmt&&attachStore[pfx]){
    await sb.from('comment_files').insert({comment_id:cmmt.id,name:attachStore[pfx].name,size:attachStore[pfx].size,data_url:attachStore[pfx].data_url});

  if(inp)inp.value='';delete attachStore[pfx];

function toggleDrop(name){if(openDrop===name){closeDrop();return;}closeDrop();openDrop=name;buildDrop(name);document.getElementById('fd-'+name).classList.remove('hidden');}
function closeDrop(){if(openDrop){document.getElementById('fd-'+openDrop)?.classList.add('hidden');}openDrop=null;}

function buildDrop(name){
  const dd=document.getElementById('fd-'+name);const sel=filters[name];
  let opts=[];
  if(name==='status')opts=statuses.map(s=>({val:s.id,label:s.name,dot:s.color}));
  else if(name==='type')opts=taskTypes.map(ty=>({val:ty.id,label:ty.name,dotColor:ty.color,dotBg:ty.bg}));
  else if(name==='priority')opts=[{val:'high',label:'High'},{val:'medium',label:'Medium'},{val:'low',label:'Low'}];
  else if(name==='assignee')opts=users.map(u=>({val:u.id,label:u.name,avHtml:avHtml(u.id,'xs')}));
  const cnt=sel.size;
  dd.innerHTML=`<div class="fdrop-search-wrap"><input class="fdrop-search" placeholder="Search…" oninput="dropSearch('${name}',this.value)" onclick="event.stopPropagation()"></div>
    <div class="fdrop-opts">${opts.map(o=>`<div class="fdrop-item${sel.has(o.val)?' on':''}" data-val="${esc(o.val)}" onclick="toggleFVal('${name}','${esc(o.val)}');event.stopPropagation()">
      <div class="fchk${sel.has(o.val)?' on':''}"></div>
      ${o.dot?`<span style="width:8px;height:8px;border-radius:50%;background:${o.dot};display:inline-block;flex-shrink:0"></span>`:''}
      ${o.dotColor?`<span style="font-size:10px;padding:1px 5px;border-radius:4px;background:${o.dotBg};color:${o.dotColor};font-weight:600">${esc(o.label)}</span>`:`<span>${o.avHtml||''}${o.avHtml?`<span style="font-size:13px;color:var(--tx);margin-left:6px">${esc(o.label)}</span>`:esc(o.label)}</span>`}
    </div>`).join('')}</div>

// LIST
// ══════════════════════════════════════════════
function renderList(){
  const q=(document.getElementById('ls-search')?.value||'').toLowerCase().trim();
  let filtered=activeTasks().filter(t=>{
    if(q&&!t.title.toLowerCase().includes(q)&&!(t.description||'').toLowerCase().includes(q))return false;
    if(filters.status.size>0&&!filters.status.has(t.status))return false;
    if(filters.type.size>0&&!filters.type.has(t.type))return false;
    if(filters.priority.size>0&&!filters.priority.has(t.priority))return false;
    if(filters.assignee.size>0&&!filters.assignee.has(t.assignee))return false;
    return true;
  });
  const{col,dir}=listSort;
  filtered.sort((a,b)=>{let va=String(a[col]||''),vb=String(b[col]||'');return va<vb?-dir:va>vb?dir:0;});
  const si=c=>listSort.col===c?(listSort.dir===1?'↑':'↓'):'↕';
  const hdrs=[{c:'title',l:'Task'},{c:'type',l:'Type'},{c:'priority',l:'Priority'},{c:'status',l:'Status'},{c:'due_date',l:'Due'},{c:'assignee',l:'Who'}];
  document.getElementById('list-body').innerHTML=
    `<div class="lrow lhdr">${hdrs.map(h=>`<div class="lhdr-cell" onclick="sortList('${h.c}')">${h.l} <span style="color:${listSort.col===h.c?'var(--gr)':'var(--t3)'};margin-left:3px">${si(h.c)}</span></div>`).join('')}</div>`+
    (filtered.length?filtered.map(t=>{
      const st=getStatus(t.status);const u=getUser(t.assignee)||{initials:'?',color:'#aaa',text_color:'#fff',name:'?'};
      return`<div class="lrow" onclick="switchTab('board');${isMob()?`openMobile(${t.id})`:`openDetail(${t.id})`}">
        <span style="color:var(--tx);font-weight:500">${esc(t.title)}</span>
        ${typeBadge(t.type)}
        <span style="font-size:12px;color:var(--t2);text-transform:capitalize;font-weight:500">${t.priority}</span>
        <span class="spill" style="background:${st.color}22;color:${st.color}">${esc(st.name)}</span>
        <span style="font-size:11px;color:var(--t3);font-weight:500">${t.due_date?fmtDate(t.due_date):'—'}</span>
        <div class="av av-sm" style="background:${u.color};color:${u.text_color||tcol(u.color)};margin:0">${esc(u.initials)}<div class="av-tip">${esc(u.name)}</div></div>
      </div>`;
    }).join(''):`<div class="section-empty">No tasks match your filters.</div>`);
}
function sortList(col){if(listSort.col===col)listSort.dir*=-1;else{listSort.col=col;listSort.dir=1;}renderList();}

function renderDash(){

// ── Status drag-to-reorder ──────────────────
function onStatusDragStart(e,idx){dragStatusIdx=idx;e.currentTarget.classList.add('dragging');}
function onStatusDragOver(e,idx){e.preventDefault();if(dragStatusIdx===idx||dragStatusIdx===null)return;document.querySelectorAll('#status-list .settings-row').forEach(r=>r.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}
function onStatusDragLeave(e){e.currentTarget.classList.remove('drag-over');}
async function onStatusDrop(e,targetIdx){
  e.preventDefault();
  document.querySelectorAll('#status-list .settings-row').forEach(r=>{r.classList.remove('drag-over');r.classList.remove('dragging');});
  if(dragStatusIdx===null||dragStatusIdx===targetIdx){dragStatusIdx=null;return;}
  // Reorder locally
  const moved=statuses.splice(dragStatusIdx,1)[0];
  statuses.splice(targetIdx,0,moved);
  // Update sort_order in DB
  for(let i=0;i<statuses.length;i++){
    await sb.from('statuses').update({sort_order:i}).eq('id',statuses[i].id);
  }
  dragStatusIdx=null;
  await reloadAndRefresh();
  renderSettings();
}

// ── Status flag toggles ──────────────────────
async function toggleStatusFlag(id,flag){
  const st=statuses.find(s=>s.id===id);if(!st)return;
  if(flag==='is_done'){
    // Only one can be "done"
    if(!st.is_done){for(const s of statuses)if(s.is_done)await sb.from('statuses').update({is_done:false}).eq('id',s.id);}
    await sb.from('statuses').update({is_done:!st.is_done}).eq('id',id);
  }else{
    await sb.from('statuses').update({[flag]:!st[flag]}).eq('id',id);
  }
  await reloadAndRefresh();renderSettings();
}

// ── Status edit inline ──────────────────────
function editStatusRow(i){
  const rows=document.querySelectorAll('#status-list .settings-row');const row=rows[i];if(!row)return;
  const st=statuses[i];
  row.draggable=false;
  const actionsDiv=row.querySelector('.smgr-actions');
  const infoDiv=row.querySelector('.settings-row-info');
  if(actionsDiv)actionsDiv.innerHTML=`<button class="btn-p" style="font-size:12px;padding:5px 11px" onclick="saveStatusRow(${i})">Save</button><button class="btn-sm" onclick="renderSettings()">Cancel</button>`;
  if(infoDiv)infoDiv.innerHTML=`<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
    <input type="color" id="esr-c-${i}" value="${st.color}" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--bd);cursor:pointer;padding:0;overflow:hidden">
    <input id="esr-n-${i}" value="${esc(st.name)}" style="flex:1;min-width:100px;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);color:var(--tx);outline:none;font-size:13px">
  </div>`;
}
async function saveStatusRow(i){
  const name=document.getElementById(`esr-n-${i}`)?.value.trim();
  const color=document.getElementById(`esr-c-${i}`)?.value;
  if(!name)return;
  await sb.from('statuses').update({name,color}).eq('id',statuses[i].id);
  await reloadAndRefresh();renderSettings();
}
async function addStatus(){
  const name=document.getElementById('new-st-name')?.value.trim();if(!name)return;
  const color=document.getElementById('new-st-color').value;
  const maxOrder=statuses.reduce((a,s)=>Math.max(a,s.sort_order),0);
  await sb.from('statuses').insert({id:'s'+Date.now(),name,color,is_done:false,hide_due:false,sort_order:maxOrder+1});
  document.getElementById('new-st-name').value='';
  await reloadAndRefresh();renderSettings();
}
async function deleteStatus(id){
  if(statuses.length<=1){showNotif('⚠️','Need at least one status.');return;}
  const fb=statuses.find(s=>s.id!==id);
  await sb.from('tasks').update({status:fb.id}).eq('status',id);
  await sb.from('statuses').delete().eq('id',id);
  await reloadAndRefresh();renderSettings();
}

async function saveTypeRow(i){

  await sb.from('task_types').update({name,color,bg:color+'22',icon}).eq('id',taskTypes[i].id);

async function addType(){
  const name=document.getElementById('new-ty-name')?.value.trim();if(!name)return;

async function deleteType(id){

// ══════════════════════════════════════════════
// TASK MODAL
// ══════════════════════════════════════════════
function openTaskModal(statusId=null,taskId=null){
  if(!can('createTask')&&!taskId)return;
  editingTaskId=taskId;
  document.getElementById('modal-title').textContent=taskId?'Edit task':'Create task';
  const t=taskId?getTask(taskId):null;
  document.getElementById('f-title').value=t?t.title:'';
  document.getElementById('f-desc').value=t?t.description||'':'';
  document.getElementById('f-priority').value=t?t.priority:'medium';
  document.getElementById('f-due').value=t?t.due_date||'':'';
  document.getElementById('f-type').innerHTML=taskTypes.map(ty=>`<option value="${esc(ty.id)}"${(t?t.type:taskTypes[0]?.id)===ty.id?' selected':''}>${esc(ty.icon)} ${esc(ty.name)}</option>`).join('');
  document.getElementById('f-assignee').innerHTML=users.map(u=>`<option value="${esc(u.id)}"${(t?t.assignee:currentUser?.id)===u.id?' selected':''}>${esc(u.name)}</option>`).join('');
  document.getElementById('f-status').innerHTML=statuses.map(s=>`<option value="${esc(s.id)}"${(t?t.status:statusId||statuses[0]?.id)===s.id?' selected':''}>${esc(s.name)}</option>`).join('');
  openModal('task-modal');
}
async function saveTask(){
  const title=document.getElementById('f-title').value.trim();if(!title)return;
  const newStatus=document.getElementById('f-status').value;
  const newSt=getStatus(newStatus);
  if(editingTaskId){
    const t=getTask(editingTaskId);
    const updates={title,description:document.getElementById('f-desc').value.trim(),type:document.getElementById('f-type').value,priority:document.getElementById('f-priority').value,assignee:document.getElementById('f-assignee').value,status:newStatus,due_date:document.getElementById('f-due').value||null,updated_at:mkTs()};
    if(t.status!==newStatus){
      const old=getStatus(t.status);
      await sb.from('comments').insert({task_id:editingTaskId,author:currentUser.id,text:`Status: <b>${old.name}</b> → <b>${newSt.name}</b>`,is_system:true});
      if(newSt.is_done&&!t.completed_at)updates.completed_at=mkTs();
    }
    await sb.from('tasks').update(updates).eq('id',editingTaskId);
  }else{
    const{data:nt}=await sb.from('tasks').insert({title,description:document.getElementById('f-desc').value.trim(),type:document.getElementById('f-type').value,priority:document.getElementById('f-priority').value,assignee:document.getElementById('f-assignee').value,status:newStatus,due_date:document.getElementById('f-due').value||null,archived:false,completed_at:newSt?.is_done?mkTs():null}).select().single();
    showNotif('✅',`"${esc(title)}" created!`);
  }
  editingTaskId=null;closeModal('task-modal');await reloadAndRefresh();
  if(selectedTaskId)setTimeout(()=>isMob()?openMobile(selectedTaskId):openDetail(selectedTaskId),80);
}

// MODALS
// ══════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
document.addEventListener('click',e=>{['task-modal','user-modal'].forEach(id=>{const el=document.getElementById(id);if(el&&!el.classList.contains('hidden')&&e.target===el)closeModal(id);});},true);
['nc-input','ms-nc-input'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const m=id.startsWith('ms');postComment(m?'ms-nc':'nc',m?'ms-comments-wrap':'comments-wrap');}});});
